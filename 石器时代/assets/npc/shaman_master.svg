  <circle cx="50" cy="30" r="4" fill="#1A237E"/>
  <circle cx="50" cy="30" r="2" fill="#E8F5E9"/>
  <ellipse cx="78" cy="30" rx="6" ry="5" fill="#FFF"/>
  <circle cx="78" cy="30" r="4" fill="#1A237E"/>
  <circle cx="78" cy="30" r="2" fill="#E8F5E9"/>
