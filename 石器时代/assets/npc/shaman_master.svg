  <!-- 嘴 -->
  <rect x="56" y="42" width="16" height="2" rx="1" fill="#8B6A50"/>
  <!-- 骨项链 -->
  <circle cx="44" cy="58" r="4" fill="#F5F0E0" stroke="#D4C5A0" stroke-width="1"/>
  <circle cx="54" cy="62" r="3" fill="#F5F0E0" stroke="#D4C5A0" stroke-width="1"/>
  <circle cx="64" cy="63" r="4" fill="#F5F0E0" stroke="#D4C5A0" stroke-width="1"/>
  <circle cx="74" cy="62" r="3" fill="#F5F0E0" stroke="#D4C5A0" stroke-width="1"/>
  <circle cx="84" cy="58" r="4" fill="#F5F0E0" stroke="#D4C5A0" stroke-width="1"/>
