<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 身体/轻便皮衣 -->
  <rect x="34" y="60" width="60" height="68" rx="8" fill="#6B8E23"/>
  <rect x="38" y="60" width="52" height="62" rx="6" fill="#8FBC3C"/>
  <!-- 腰带 -->
  <rect x="34" y="88" width="60" height="6" rx="2" fill="#5D4037"/>
  <rect x="60" y="86" width="8" height="10" rx="2" fill="#D4A06A"/>
  <!-- 脖子 -->
  <rect x="52" y="50" width="24" height="14" rx="5" fill="#FFCC80"/>
  <!-- 头部 -->
  <ellipse cx="64" cy="28" rx="24" ry="26" fill="#FFCC80"/>
  <!-- 长发编辫(深棕) -->
  <ellipse cx="64" cy="14" rx="26" ry="12" fill="#4A3728"/>
  <rect x="36" y="10" width="10" height="36" rx="5" fill="#4A3728"/>
  <rect x="82" y="10" width="10" height="36" rx="5" fill="#4A3728"/>
  <!-- 辫子(右侧) -->
  <rect x="88" y="30" width="8" height="50" rx="4" fill="#4A3728"/>
  <circle cx="92" cy="80" r="4" fill="#4A3728"/>
  <!-- 鹰羽装饰 -->
  <polygon points="38,10 34,0 42,6" fill="#E8E0D0"/>
  <polygon points="42,8 40,0 46,4" fill="#D4C5A0"/>
  <!-- 眼睛(灵动) -->
  <ellipse cx="54" cy="30" rx="5" ry="5" fill="#FFF"/>
  <circle cx="55" cy="30" r="3" fill="#2E7D32"/>
  <circle cx="56" cy="29" r="1" fill="#FFF"/>
  <ellipse cx="74" cy="30" rx="5" ry="5" fill="#FFF"/>
  <circle cx="73" cy="30" r="3" fill="#2E7D32"/>
  <circle cx="74" cy="29" r="1" fill="#FFF"/>
  <!-- 睫毛 -->
  <line x1="49" y1="26" x2="51" y2="24" stroke="#4A3728" stroke-width="1"/>
  <line x1="69" y1="26" x2="71" y2="24" stroke="#4A3728" stroke-width="1"/>
  <!-- 鼻子 -->
  <circle cx="64" cy="34" r="2" fill="#E8B878"/>
  <!-- 嘴(微笑) -->
  <path d="M58,40 Q64,44 70,40" fill="none" stroke="#C0392B" stroke-width="2"/>
  <!-- 弓(背后) -->
  <path d="M22,30 Q14,64 22,98" fill="none" stroke="#8B6914" stroke-width="4"/>
  <line x1="22" y1="30" x2="22" y2="98" stroke="#D4C5A0" stroke-width="1.5"/>
  <!-- 手臂 -->
  <rect x="24" y="62" width="12" height="36" rx="5" fill="#FFCC80"/>
  <rect x="92" y="62" width="12" height="36" rx="5" fill="#FFCC80"/>
</svg>
