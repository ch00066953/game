<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- 身体/厚兽皮铠甲 -->
  <rect x="24" y="58" width="80" height="70" rx="8" fill="#5D4037"/>
  <rect x="28" y="58" width="72" height="64" rx="6" fill="#795548"/>
  <!-- 肩甲(骨头护肩) -->
  <ellipse cx="30" cy="60" rx="14" ry="8" fill="#F5F0E0"/>
  <ellipse cx="98" cy="60" rx="14" ry="8" fill="#F5F0E0"/>
  <rect x="22" y="56" width="10" height="4" rx="2" fill="#D4C5A0"/>
  <rect x="96" y="56" width="10" height="4" rx="2" fill="#D4C5A0"/>
  <!-- 胸口X绑带 -->
  <line x1="40" y1="62" x2="88" y2="90" stroke="#3E2723" stroke-width="3"/>
  <line x1="88" y1="62" x2="40" y2="90" stroke="#3E2723" stroke-width="3"/>
  <!-- 脖子(粗) -->
  <rect x="48" y="48" width="32" height="14" rx="6" fill="#C68642"/>
  <!-- 头部(大) -->
  <rect x="34" y="8" width="60" height="44" rx="16" fill="#C68642"/>
  <!-- 短发(棕色) -->
  <rect x="32" y="6" width="64" height="18" rx="10" fill="#3E2723"/>
  <!-- 疤痕 -->
  <line x1="72" y1="22" x2="82" y2="36" stroke="#A0522D" stroke-width="2"/>
  <!-- 浓眉 -->
  <rect x="42" y="26" width="16" height="4" rx="2" fill="#3E2723"/>
  <rect x="70" y="26" width="16" height="4" rx="2" fill="#3E2723"/>
  <!-- 眼睛(凶狠) -->
  <ellipse cx="50" cy="33" rx="6" ry="4" fill="#FFF"/>
  <circle cx="51" cy="33" r="3" fill="#4A2800"/>
  <ellipse cx="78" cy="33" rx="6" ry="4" fill="#FFF"/>
  <circle cx="77" cy="33" r="3" fill="#4A2800"/>
  <!-- 鼻子 -->
  <polygon points="60,36 68,36 64,42" fill="#A5723A"/>
  <!-- 嘴(紧闭) -->
  <rect x="54" y="44" width="20" height="3" rx="1" fill="#8B4513"/>
  <!-- 手臂 -->
  <rect x="14" y="60" width="14" height="40" rx="6" fill="#C68642"/>
  <rect x="100" y="60" width="14" height="40" rx="6" fill="#C68642"/>
  <!-- 右手石剑 -->
  <rect x="108" y="40" width="6" height="50" rx="2" fill="#808080"/>
  <rect x="104" y="86" width="14" height="6" rx="2" fill="#5D4037"/>
</svg>
