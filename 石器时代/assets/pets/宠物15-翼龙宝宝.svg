<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 翼龙宝宝 - 可爱小翼龙 -->
  <!-- 大翅膀（左） -->
  <path d="M50 95 Q15 60 20 80 Q5 55 15 85 Q0 65 18 95 Q25 105 50 100Z" fill="#00ACC1" opacity="0.5"/>
  <!-- 大翅膀（右） -->
  <path d="M150 95 Q185 60 180 80 Q195 55 185 85 Q200 65 182 95 Q175 105 150 100Z" fill="#00ACC1" opacity="0.5"/>
  <!-- 身体 -->
  <ellipse cx="100" cy="130" rx="32" ry="26" fill="#00ACC1"/>
  <!-- 肚子 -->
  <ellipse cx="100" cy="134" rx="22" ry="18" fill="#80DEEA"/>
  <!-- 头 -->
  <circle cx="100" cy="78" r="30" fill="#00ACC1"/>
  <ellipse cx="100" cy="82" rx="24" ry="22" fill="#26C6DA"/>
  <!-- 头冠 -->
  <path d="M108 48 Q115 25 118 45 Q120 22 122 48" fill="#0097A7"/>
  <!-- 尖嘴 -->
  <path d="M88 88 Q100 100 112 88 Q100 95 88 88Z" fill="#00838F"/>
  <path d="M92 88 Q100 96 108 88 Q100 92 92 88Z" fill="#00ACC1"/>
  <!-- 大眼睛 -->
  <ellipse cx="88" cy="72" rx="10" ry="12" fill="white"/>
  <ellipse cx="112" cy="72" rx="10" ry="12" fill="white"/>
  <circle cx="90" cy="74" r="6" fill="#FF6F00"/>
  <circle cx="114" cy="74" r="6" fill="#FF6F00"/>
  <circle cx="88" cy="74" r="3" fill="#333"/>
  <circle cx="112" cy="74" r="3" fill="#333"/>
  <circle cx="89" cy="71" r="2" fill="white"/>
  <circle cx="113" cy="71" r="2" fill="white"/>
  <!-- 微笑 -->
  <path d="M95 92 Q100 96 105 92" stroke="#006064" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="78" cy="82" rx="5" ry="3" fill="#F48FB1" opacity="0.4"/>
  <ellipse cx="122" cy="82" rx="5" ry="3" fill="#F48FB1" opacity="0.4"/>
  <!-- 小爪子 -->
  <ellipse cx="72" cy="125" rx="6" ry="5" fill="#00ACC1" transform="rotate(-15,72,125)"/>
  <ellipse cx="128" cy="125" rx="6" ry="5" fill="#00ACC1" transform="rotate(15,128,125)"/>
  <!-- 小脚 -->
  <path d="M82 152 L76 162 L82 158 L85 164 L88 158 L92 162 L90 152Z" fill="#00838F"/>
  <path d="M108 152 L102 162 L108 158 L111 164 L114 158 L118 162 L116 152Z" fill="#00838F"/>
  <!-- 云朵装饰 -->
  <g opacity="0.3">
    <ellipse cx="30" cy="40" rx="15" ry="8" fill="white"/>
    <ellipse cx="40" cy="36" rx="12" ry="7" fill="white"/>
    <ellipse cx="165" cy="45" rx="14" ry="7" fill="white"/>
    <ellipse cx="175" cy="42" rx="10" ry="6" fill="white"/>
  </g>
  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#006064" font-family="sans-serif">翼龙宝宝</text>
</svg>