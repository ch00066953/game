  <path d="M142 125 Q155 118 158 128 Q160 136 152 132" stroke="#8D6E63" stroke-width="3" fill="none" stroke-linecap="round"/>
  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#5D4037" font-family="sans-serif">布朗猪猪</text>
</svg>