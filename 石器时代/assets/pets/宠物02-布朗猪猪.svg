  <path d="M83 103 Q80 112 84 110" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
  <path d="M117 103 Q120 112 116 110" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- 小脚 -->
  <ellipse cx="75" cy="160" rx="10" ry="6" fill="#795548"/>
