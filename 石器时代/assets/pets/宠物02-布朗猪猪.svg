  <circle cx="118" cy="79" r="5.5" fill="#333"/>
  <circle cx="89" cy="76" r="2" fill="white"/>
  <circle cx="119" cy="76" r="2" fill="white"/>
  <!-- 猪鼻子 -->
  <ellipse cx="100" cy="95" rx="14" ry="10" fill="#795548"/>
  <ellipse cx="100" cy="95" rx="11" ry="8" fill="#A1887F"/>
  <circle cx="95" cy="95" r="3" fill="#5D4037"/>
  <circle cx="105" cy="95" r="3" fill="#5D4037"/>
  <!-- 微笑 -->
  <path d="M92 105 Q100 112 108 105" stroke="#5D4037" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="75" cy="92" rx="7" ry="4" fill="#EF9A9A" opacity="0.5"/>
  <ellipse cx="125" cy="92" rx="7" ry="4" fill="#EF9A9A" opacity="0.5"/>
  <!-- 小耳朵 -->
  <path d="M70 65 Q62 45 78 58" fill="#8D6E63"/>
  <path d="M72 63 Q66 50 79 59" fill="#BCAAA4"/>
  <path d="M130 65 Q138 45 122 58" fill="#8D6E63"/>
