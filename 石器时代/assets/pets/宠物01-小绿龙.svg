<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 小绿龙 - 可爱迷你恐龙 -->
  <!-- 身体 -->
  <ellipse cx="100" cy="130" rx="40" ry="35" fill="#7CB342"/>
  <!-- 肚子 -->
  <ellipse cx="100" cy="135" rx="28" ry="25" fill="#C5E1A5"/>
  <!-- 头 -->
  <circle cx="100" cy="80" r="35" fill="#7CB342"/>
  <!-- 脸蛋 -->
  <ellipse cx="100" cy="85" rx="28" ry="25" fill="#AED581"/>
  <!-- 大眼睛 -->
  <ellipse cx="87" cy="75" rx="10" ry="12" fill="white"/>
  <ellipse cx="113" cy="75" rx="10" ry="12" fill="white"/>
  <circle cx="90" cy="76" r="6" fill="#333"/>
  <circle cx="116" cy="76" r="6" fill="#333"/>
  <circle cx="92" cy="73" r="2.5" fill="white"/>
  <circle cx="118" cy="73" r="2.5" fill="white"/>
  <!-- 小鼻子 -->
  <circle cx="97" cy="87" r="2" fill="#558B2F"/>
  <circle cx="103" cy="87" r="2" fill="#558B2F"/>
  <!-- 微笑 -->
  <path d="M90 95 Q100 105 110 95" stroke="#558B2F" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="78" cy="90" rx="7" ry="4" fill="#F48FB1" opacity="0.4"/>
  <ellipse cx="122" cy="90" rx="7" ry="4" fill="#F48FB1" opacity="0.4"/>
  <!-- 小角 -->
  <path d="M80 55 Q78 42 85 50" fill="#AED581"/>
  <path d="M120 55 Q122 42 115 50" fill="#AED581"/>
  <!-- 背刺 -->
  <path d="M100 45 L96 38 L100 42 L104 38Z" fill="#558B2F"/>
  <!-- 小手 -->
  <ellipse cx="62" cy="120" rx="8" ry="6" fill="#7CB342" transform="rotate(-20,62,120)"/>
  <ellipse cx="138" cy="120" rx="8" ry="6" fill="#7CB342" transform="rotate(20,138,120)"/>
  <!-- 小脚 -->
  <ellipse cx="80" cy="162" rx="12" ry="7" fill="#7CB342"/>
  <ellipse cx="120" cy="162" rx="12" ry="7" fill="#7CB342"/>
  <!-- 尾巴 -->
  <path d="M140 140 Q160 135 165 150 Q168 158 160 155" fill="#7CB342" stroke="none"/>
  <!-- 名字 -->
  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#558B2F" font-family="sans-serif">小绿龙</text>
</svg>