  <path d="M80 85 Q72 92 75 100" stroke="#FFF8E1" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M120 85 Q128 92 125 100" stroke="#FFF8E1" stroke-width="4" fill="none" stroke-linecap="round"/>
