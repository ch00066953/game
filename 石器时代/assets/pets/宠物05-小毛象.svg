  <ellipse cx="136" cy="70" rx="10" ry="14" fill="#EF9A9A" opacity="0.4"/>
  <!-- 小脚 -->
  <ellipse cx="75" cy="158" rx="12" ry="7" fill="#795548"/>
  <ellipse cx="95" cy="160" rx="11" ry="6" fill="#795548"/>
  <ellipse cx="105" cy="160" rx="11" ry="6" fill="#795548"/>
  <ellipse cx="125" cy="158" rx="12" ry="7" fill="#795548"/>
