  <!-- 象鼻 -->
  <path d="M100 82 Q100 100 95 110 Q92 116 88 112" stroke="#8D6E63" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M100 82 Q100 100 95 110 Q92 116 88 112" stroke="#A1887F" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- 鼻孔 -->
  <circle cx="87" cy="112" r="2.5" fill="#5D4037"/>
