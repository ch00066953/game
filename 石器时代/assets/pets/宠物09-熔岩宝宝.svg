<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 熔岩宝宝 - 可爱小火龙 -->
  <!-- 翅膀（左） -->
  <path d="M55 95 Q35 75 40 95 Q30 85 40 105 Q45 110 55 105Z" fill="#EF5350" opacity="0.7"/>
  <!-- 翅膀（右） -->
  <path d="M145 95 Q165 75 160 95 Q170 85 160 105 Q155 110 145 105Z" fill="#EF5350" opacity="0.7"/>
  <!-- 尾巴 -->
  <path d="M55 135 Q35 130 30 145 Q28 152 35 148" fill="#E53935"/>
  <!-- 尾巴火焰 -->
  <circle cx="28" cy="146" r="6" fill="#FF9800"/>
  <circle cx="26" cy="143" r="4" fill="#FFEB3B"/>
  <!-- 身体 -->
  <ellipse cx="100" cy="125" rx="38" ry="32" fill="#E53935"/>
  <!-- 肚子 -->
  <ellipse cx="100" cy="130" rx="27" ry="24" fill="#FFCDD2"/>
  <!-- 肚子纹理 -->
  <g stroke="#EF9A9A" stroke-width="1" opacity="0.4">
    <path d="M82 122 Q100 118 118 122"/>
    <path d="M84 130 Q100 127 116 130"/>
    <path d="M86 138 Q100 135 114 138"/>
  </g>
  <!-- 头 -->
  <circle cx="100" cy="78" r="32" fill="#E53935"/>
  <!-- 脸 -->
  <ellipse cx="100" cy="82" rx="26" ry="24" fill="#EF5350"/>
  <!-- 小角 -->
  <path d="M75 55 Q70 38 80 48" fill="#C62828"/>
  <path d="M125 55 Q130 38 120 48" fill="#C62828"/>
  <!-- 大眼睛 -->
  <ellipse cx="88" cy="74" rx="10" ry="12" fill="white"/>
  <ellipse cx="112" cy="74" rx="10" ry="12" fill="white"/>
  <circle cx="90" cy="75" r="6" fill="#FF6F00"/>
  <circle cx="114" cy="75" r="6" fill="#FF6F00"/>
  <circle cx="88" cy="75" r="3" fill="#333"/>
  <circle cx="112" cy="75" r="3" fill="#333"/>
  <circle cx="89" cy="72" r="2" fill="white"/>
  <circle cx="113" cy="72" r="2" fill="white"/>
  <!-- 小鼻子呼火 -->
  <circle cx="96" cy="87" r="2" fill="#C62828"/>
  <circle cx="104" cy="87" r="2" fill="#C62828"/>
  <!-- 鼻烟 -->
  <g opacity="0.3" fill="#FFEB3B">
    <circle cx="94" cy="82" r="2"/>
    <circle cx="91" cy="78" r="1.5"/>
    <circle cx="106" cy="82" r="2"/>
    <circle cx="109" cy="78" r="1.5"/>
  </g>
  <!-- 微笑 -->
  <path d="M92 95 Q100 103 108 95" stroke="#B71C1C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- 腮红 -->
  <ellipse cx="78" cy="88" rx="6" ry="3.5" fill="#FF8A80" opacity="0.5"/>
  <ellipse cx="122" cy="88" rx="6" ry="3.5" fill="#FF8A80" opacity="0.5"/>
  <!-- 小手 -->
  <ellipse cx="62" cy="115" rx="8" ry="6" fill="#E53935" transform="rotate(-20,62,115)"/>
  <ellipse cx="138" cy="115" rx="8" ry="6" fill="#E53935" transform="rotate(20,138,115)"/>
  <!-- 小脚 -->
  <ellipse cx="80" cy="158" rx="12" ry="7" fill="#C62828"/>
  <ellipse cx="120" cy="158" rx="12" ry="7" fill="#C62828"/>
  <text x="100" y="190" text-anchor="middle" font-size="12" fill="#B71C1C" font-family="sans-serif">熔岩宝宝</text>
</svg>