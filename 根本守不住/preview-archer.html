<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>精灵弓手预览</title>
  <style>
    html,body{height:100%;margin:0;font-family:Microsoft YaHei, sans-serif;background:linear-gradient(180deg,#e8fbff,#f6fff2)}
    .wrap{max-width:900px;margin:18px auto;padding:18px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(20,40,80,0.08)}
    h1{margin:0 0 12px;font-size:20px}
    #canvasWrap{display:flex;gap:12px;align-items:flex-start}
    canvas{background:linear-gradient(#9ed8ff,#bfeebb);border-radius:8px;border:6px solid rgba(255,255,255,0.6);}
    .controls{width:260px}
    .controls button{display:block;width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:none;background:#4aa3ff;color:#fff;font-weight:700}
    .row{display:flex;gap:8px}
    .meta{font-size:13px;color:#445}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>精灵弓手（预览） — 金发小美女 / 敌方对比</h1>
    <div id="canvasWrap">
      <canvas id="pvCanvas" width="640" height="360"></canvas>
      <div class="controls">
        <button id="toggleSide">切换为：我方（金发）</button>
        <button id="toggleAnim">切换动画：待机</button>
        <button id="shootBtn">发射箭矢（触发特效）</button>
        <div class="meta">说明：可见更高细节的面部、发色、兜帽、心形弓、呼吸与拉弓动效。</div>
      </div>
    </div>
  </div>
  <script src="preview-archer.js"></script>
</body>
</html>
