<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>精灵美少女立绘（静态）</title>
  <style>
    html,body{height:100%;margin:0;font-family:Microsoft YaHei, Arial, sans-serif;background:linear-gradient(180deg,#f2fbff,#fffaf2)}
    .wrap{max-width:900px;margin:18px auto;padding:18px;background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(20,40,80,0.08)}
    h1{margin:0 0 12px;font-size:20px}
    .row{display:flex;gap:12px}
    canvas{background:linear-gradient(#dff4ff,#fff9f0);border-radius:6px;border:1px solid rgba(0,0,0,0.06)}
    .controls{width:240px}
    .controls button{display:block;width:100%;padding:10px;margin-bottom:8px;border-radius:8px;border:none;background:#4aa3ff;color:#fff;font-weight:700}
    .meta{font-size:13px;color:#445}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>立绘预览 — 精灵美少女（静态）</h1>
    <div class="row">
      <canvas id="porCanvas" width="720" height="1080"></canvas>
      <div class="controls">
        <button id="exportBtn">导出 PNG</button>
        <button id="variantBtn">切换风格：清新 / 暗金</button>
        <div class="meta">说明：本页展示一个高细节 Canvas 绘制的立绘，可导出 PNG 用作立绘或美术参考。</div>
      </div>
    </div>
  </div>
  <script src="portrait-archer.js"></script>
</body>
</html>
