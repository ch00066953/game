<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魂斗罗</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="app">
        <header class="hud">
            <h1>魂斗罗</h1>
            <div class="stats">
                <div class="card"><span>生命</span><strong id="hp">5</strong></div>
                <div class="card"><span>分数</span><strong id="score">0</strong></div>
                <div class="card"><span>剩余敌人</span><strong id="enemyLeft">0</strong></div>
                <div class="card"><span>BOSS血量</span><strong id="bossHp">--</strong></div>
            </div>
        </header>

        <main class="game-wrap">
            <canvas id="gameCanvas" width="960" height="540" aria-label="魂斗罗游戏画布"></canvas>

            <div id="startMenu" class="overlay show">
                <div class="panel">
                    <h2>开始游戏</h2>
                    <p>冲过战线，击败肌肉男 Boss 后冲线完成任务。</p>
                    <button id="startBtn" class="btn primary">开始</button>
                </div>
            </div>

            <div id="pauseMenu" class="overlay">
                <div class="panel">
                    <h2>已暂停</h2>
                    <button id="resumeBtn" class="btn primary">继续</button>
                </div>
            </div>

            <div id="gameOverMenu" class="overlay">
                <div class="panel">
                    <h2 id="endTitle">任务失败</h2>
                    <p id="endText"></p>
                    <div id="settlementWrap" class="settlement-wrap" aria-live="polite">
                        <img id="settlementImage" alt="通关结算图" />
                        <p id="settlementFallback" class="settlement-fallback">结算图加载失败，请检查图片路径。</p>
                    </div>
                    <button id="restartBtn" class="btn primary">重新开始</button>
                </div>
            </div>
        </main>

        <footer class="controls">
            <button id="pauseBtn" class="btn" disabled>暂停</button>
            <p>A/D 或 ←/→ 移动，W/↑/空格 跳跃，J 射击，P 暂停</p>
        </footer>

        <!-- 移动端虚拟控制器 -->
        <div class="mobile-controls" id="mobileControls">
            <div class="ctrl-dpad">
                <button class="ctrl-btn ctrl-up" data-key="ArrowUp">▲</button>
                <div class="ctrl-mid-row">
                    <button class="ctrl-btn ctrl-left" data-key="ArrowLeft">◀</button>
                    <button class="ctrl-btn ctrl-right" data-key="ArrowRight">▶</button>
                </div>
            </div>
            <div class="ctrl-actions">
                <button class="ctrl-btn ctrl-jump" data-key="Space">跳</button>
                <button class="ctrl-btn ctrl-shoot" data-key="KeyJ">射</button>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
